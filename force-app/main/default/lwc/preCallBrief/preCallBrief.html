<!-- preCallBrief.html -->
<!-- Part 7 — 360° Pre-Call Brief LWC -->
<!-- Place on Contact Record Page via App Builder -->
<template>
  <lightning-card title="360° Pre-Call Brief" icon-name="standard:contact">

    <!-- LOADING STATE -->
    <template if:true={isLoading}>
      <div style="padding:32px;text-align:center">
        <lightning-spinner alternative-text="Loading brief..." size="medium"></lightning-spinner>
        <p style="margin-top:12px;color:#64748B;font-size:13px">Building your pre-call brief...</p>
      </div>
    </template>

    <!-- LOADED STATE -->
    <template if:false={isLoading}>

      <!-- ── PORTFOLIO SECTION ── -->
      <div class="slds-p-horizontal_medium slds-p-top_medium slds-p-bottom_small">
        <p class="slds-text-heading_small slds-m-bottom_small" style="font-weight:700">Portfolio Overview</p>
        <div class="slds-grid slds-gutters slds-wrap">

          <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4 slds-m-bottom_small">
            <p class="slds-text-color_weak" style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;font-weight:600">Total AUM</p>
            <p class="slds-text-heading_medium" style="font-weight:700">₹{contact.Total_AUM__c} Cr</p>
          </div>

          <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4 slds-m-bottom_small">
            <p class="slds-text-color_weak" style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;font-weight:600">IT Exposure</p>
            <p class="slds-text-heading_medium" style={exposureStyle}>{contact.IT_Sector_Exposure_Pct__c}%</p>
          </div>

          <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4 slds-m-bottom_small">
            <p class="slds-text-color_weak" style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;font-weight:600">Risk Profile</p>
            <p class="slds-text-heading_medium" style="font-weight:700">{contact.Risk_Profile__c}</p>
          </div>

          <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4 slds-m-bottom_small">
            <p class="slds-text-color_weak" style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;font-weight:600">Impact Level</p>
            <p class="slds-text-heading_medium" style={impactStyle}>{contact.Impact_Severity__c}</p>
          </div>

        </div>
      </div>

      <!-- ── AI TALKING POINTS ── -->
      <div class="slds-p-horizontal_medium slds-m-bottom_small">
        <div style="background:#F0FDF4;border-left:4px solid #16A34A;
                    border-radius:0 8px 8px 0;padding:14px 16px">
          <p style="font-size:11px;font-weight:700;text-transform:uppercase;
                    letter-spacing:.08em;color:#16A34A;margin-bottom:6px">
            🤖 AI Suggested Talking Points
          </p>
          <p style="font-size:13.5px;color:#1C2B20;white-space:pre-line;line-height:1.7">
            {aiTalkingPoints}
          </p>
        </div>
      </div>

      <!-- ── FINANCIAL GOALS ── -->
      <div class="slds-p-horizontal_medium slds-p-bottom_small">
        <p class="slds-text-heading_small slds-m-bottom_small" style="font-weight:700">Family & Financial Milestones</p>

        <template if:true={hasGoals}>
          <template for:each={goals} for:item="goal">
            <div key={goal.Id}
                 style="display:flex;align-items:flex-start;gap:10px;
                        padding:8px 0;border-bottom:1px solid #F1F5F9">
              <lightning-icon icon-name="utility:target" size="x-small"
                              style="color:#0EA5E9;margin-top:2px"></lightning-icon>
              <div>
                <span style="font-weight:600;font-size:13px">{goal.Name}</span>
                <span style="color:#64748B;font-size:12px;margin-left:8px">
                  Target: {goal.TargetDate__c}
                </span>
                <template if:true={goal.TargetValue__c}>
                  <span style="color:#0EA5E9;font-size:12px;margin-left:6px">
                    · ₹{goal.TargetValue__c}
                  </span>
                </template>
              </div>
            </div>
          </template>
        </template>

        <template if:false={hasGoals}>
          <p class="slds-text-color_weak" style="font-size:13px;padding:8px 0">
            No financial goals recorded yet.
          </p>
        </template>
      </div>

      <!-- ── LAST ADVISORY ── -->
      <div class="slds-p-horizontal_medium slds-p-bottom_medium"
           style="border-top:1px solid #F1F5F9;padding-top:10px;margin-top:4px">
        <p style="font-size:12px;color:#94A3B8">
          Preferred channel: <strong style="color:#475569">{contact.Preferred_Channel__c}</strong>
          &nbsp;·&nbsp;
          Last advisory sent: <strong style="color:#475569">{contact.Last_Advisory_Sent__c}</strong>
        </p>
      </div>

    </template>
  </lightning-card>
</template>
